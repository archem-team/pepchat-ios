appId: chat.zeko.app
---
# Logout flow — navigates to You tab, opens settings, and signs out.

# Navigate to settings (You tab → settings gear)
- tapOn:
    id: home.youTab
- tapOn:
    id: you.settingsButton

# Wait for settings screen to load
- assertVisible: Settings

# Tap Log Out button
- tapOn:
    id: settings.logoutButton

# Confirm logout in the dialog
- tapOn: "Yes"
